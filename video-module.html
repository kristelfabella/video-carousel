<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Module</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --accent: #9644ed;
    --accent-hover: #7b28d8;
    --accent-dim: rgba(150,68,237,0.18);
    --accent-glow: rgba(150,68,237,0.40);
    --black: #07061a;
    --white: #ffffff;
    --white-80: rgba(255,255,255,0.80);
    --white-55: rgba(255,255,255,0.55);
    --white-20: rgba(255,255,255,0.20);
    --white-10: rgba(255,255,255,0.10);
    --white-06: rgba(255,255,255,0.06);
    --overlay: rgba(6,3,20,0.35);
  }

  html, body {
    width: 100%;
    height: 100%;
    background: var(--black);
    font-family: 'Calibri', 'Carlito', 'Trebuchet MS', Arial, sans-serif;
    color: var(--white);
    overflow: hidden;
  }

  .canvas {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .bg-layer {
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 50%, #07061a 100%);
    z-index: 0;
  }

  .bg-layer::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(circle at 20% 50%, rgba(150,68,237,0.08) 0%, transparent 50%),
      radial-gradient(circle at 80% 20%, rgba(150,68,237,0.05) 0%, transparent 40%),
      radial-gradient(circle at 50% 80%, rgba(150,68,237,0.06) 0%, transparent 45%);
  }

  .bg-overlay {
    position: absolute;
    inset: 0;
    background: var(--overlay);
    z-index: 1;
  }

  .content {
    position: relative;
    z-index: 2;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    padding: clamp(0.8rem, 3vh, 1.5rem) clamp(0.8rem, 3vw, 1.5rem);
    gap: clamp(0.6rem, 2vh, 1rem);
  }

  .progress-bar-wrap {
    width: 100%;
    height: clamp(3px, 0.6vh, 5px);
    background: var(--white-10);
    border-radius: 100px;
    overflow: hidden;
    flex-shrink: 0;
  }

  .progress-bar-fill {
    height: 100%;
    width: 0%;
    background: var(--accent);
    border-radius: 100px;
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 0 8px var(--accent-glow);
  }

  .carousel-stage {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    min-height: 0;
    gap: 0;
  }

  .video-card {
    flex: 1;
    max-width: min(860px, 90vw);
    height: 100%;
    max-height: 100%;
    display: flex;
    flex-direction: column;
    border: 1px solid var(--white-10);
    border-radius: clamp(10px, 2vw, 16px);
    background: var(--white-06);
    backdrop-filter: blur(10px);
    overflow: hidden;
    transition: border-color 0.3s ease, box-shadow 0.3s ease;
    position: relative;
  }

  .video-card.active {
    border-color: var(--accent);
    box-shadow: 0 0 24px rgba(150,68,237,0.15), inset 0 0 20px rgba(150,68,237,0.05);
  }

  .video-card.visited {
    border-color: rgba(150,68,237,0.25);
  }

  .video-player {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    background: #000;
    overflow: hidden;
    flex-shrink: 0;
  }

  .video-player video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .video-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(180deg, rgba(7,6,26,0.3) 0%, rgba(7,6,26,0.7) 100%);
    cursor: pointer;
    transition: opacity 0.3s ease;
  }

  .video-overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .play-button {
    width: clamp(48px, 8vw, 72px);
    height: clamp(48px, 8vw, 72px);
    border-radius: 50%;
    background: var(--accent);
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 4px 16px rgba(150,68,237,0.4);
  }

  .play-button:hover {
    background: var(--accent-hover);
    transform: scale(1.08);
    box-shadow: 0 0 24px var(--accent-glow), 0 4px 16px rgba(150,68,237,0.5);
  }

  .play-button svg {
    width: 40%;
    height: 40%;
    fill: var(--white);
    margin-left: 4px;
  }

  .video-error-msg {
    display: none;
    position: absolute;
    inset: 0;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 8px;
    background: rgba(7,6,26,0.85);
    color: var(--white-55);
    font-size: clamp(0.7rem, 1.5vw, 0.85rem);
    text-align: center;
    padding: 1rem;
  }

  .video-error-msg.visible {
    display: flex;
  }

  .video-error-msg svg {
    width: 32px;
    height: 32px;
    fill: rgba(150,68,237,0.5);
    margin-bottom: 4px;
  }

  .video-duration {
    position: absolute;
    bottom: clamp(8px, 1.5vh, 12px);
    right: clamp(8px, 1.5vw, 12px);
    background: rgba(7,6,26,0.85);
    padding: 3px 8px;
    border-radius: 4px;
    font-size: clamp(0.55rem, 1.2vw, 0.68rem);
    color: var(--white-80);
    font-weight: 400;
  }

  .video-progress-wrap {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: rgba(255,255,255,0.15);
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .video-player:hover .video-progress-wrap,
  .video-player.playing .video-progress-wrap {
    opacity: 1;
  }

  .video-progress-fill {
    height: 100%;
    width: 0%;
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent-glow);
    transition: width 0.1s linear;
  }

  .nav-arrow-overlay {
    position: absolute;
    top: 0;
    bottom: 0;
    width: clamp(44px, 7vw, 64px);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--white);
    background: transparent;
    border: none;
    z-index: 10;
    transition: background 0.3s ease, opacity 0.3s ease;
    opacity: 0;
  }

  .video-player:hover .nav-arrow-overlay,
  .nav-arrow-overlay:focus-visible {
    opacity: 1;
  }

  .nav-arrow-overlay:hover {
    background: rgba(7, 6, 26, 0.4);
  }

  .nav-arrow-overlay:disabled {
    opacity: 0 !important;
    cursor: not-allowed;
    pointer-events: none;
  }

  .nav-arrow-overlay.prev {
    left: 0;
    border-radius: 10px 0 0 0;
  }

  .nav-arrow-overlay.next {
    right: 0;
    border-radius: 0 10px 0 0;
  }

  .nav-arrow-overlay svg {
    width: clamp(24px, 4vw, 36px);
    height: clamp(24px, 4vw, 36px);
    fill: currentColor;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
    transition: transform 0.2s ease;
  }

  .nav-arrow-overlay:hover svg {
    transform: scale(1.15);
  }

  .thumbnail-strip {
    flex-shrink: 0;
    display: flex;
    gap: clamp(0.4rem, 1vw, 0.7rem);
    justify-content: center;
    padding: clamp(0.3rem, 1vh, 0.5rem) 0;
    overflow-x: auto;
    scrollbar-width: none;
  }

  .thumbnail-strip::-webkit-scrollbar { display: none; }

  .thumbnail {
    flex-shrink: 0;
    width: clamp(56px, 10vw, 80px);
    aspect-ratio: 16 / 9;
    border-radius: 6px;
    overflow: hidden;
    border: 2px solid transparent;
    cursor: pointer;
    position: relative;
    background: var(--white-06);
    transition: all 0.3s ease;
  }

  .thumbnail:hover {
    border-color: rgba(150,68,237,0.4);
    transform: translateY(-2px);
  }

  .thumbnail.active {
    border-color: var(--accent);
    box-shadow: 0 0 12px rgba(150,68,237,0.3);
  }

  .thumbnail.visited::after {
    content: '';
    position: absolute;
    top: 3px;
    right: 3px;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 4px var(--accent-glow);
  }

  .thumbnail img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0.6;
    transition: opacity 0.3s ease;
  }

  .thumbnail.active img,
  .thumbnail:hover img { opacity: 1; }

  .thumbnail-fallback {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(150,68,237,0.12);
    color: var(--white-20);
    font-size: clamp(0.6rem, 1.2vw, 0.75rem);
    font-weight: 600;
  }

  .thumbnail-number {
    position: absolute;
    bottom: 2px;
    left: 4px;
    font-size: clamp(0.5rem, 1vw, 0.65rem);
    font-weight: 600;
    color: var(--white);
    text-shadow: 0 1px 3px rgba(0,0,0,0.8);
  }

  .dot-indicators {
    flex-shrink: 0;
    display: flex;
    gap: 6px;
    justify-content: center;
    padding: 2px 0;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--white-20);
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .dot:hover { background: rgba(150,68,237,0.5); }

  .dot.active {
    background: var(--accent);
    width: 18px;
    border-radius: 100px;
    box-shadow: 0 0 8px var(--accent-glow);
  }

  .dot.watched { background: rgba(150,68,237,0.5); }

  .footer {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: clamp(0.4rem, 1vh, 0.6rem);
    border-top: 1px solid var(--white-10);
  }

  .progress-text {
    font-size: clamp(0.6rem, 1.3vw, 0.72rem);
    color: var(--white-55);
    font-weight: 400;
  }

  .progress-text strong {
    color: var(--accent);
    font-weight: 600;
  }

  .completion-label {
    font-size: clamp(0.6rem, 1.3vw, 0.72rem);
    color: var(--white-55);
    font-weight: 400;
  }

  .tooltip {
    position: fixed;
    background: rgba(7, 6, 26, 0.95);
    border: 1px solid var(--accent);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: clamp(0.6rem, 1.3vw, 0.72rem);
    color: var(--white-80);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s ease;
    z-index: 1000;
    max-width: 220px;
    backdrop-filter: blur(10px);
    box-shadow: 0 4px 16px rgba(0,0,0,0.3), 0 0 12px rgba(150,68,237,0.2);
  }

  .tooltip.visible { opacity: 1; }

  .instruction-popup {
    position: absolute;
    background: rgba(7, 6, 26, 0.92);
    border: 1px solid var(--accent);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: clamp(0.62rem, 1.4vw, 0.75rem);
    color: var(--white-80);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.25s ease, transform 0.25s ease;
    z-index: 50;
    max-width: 220px;
    backdrop-filter: blur(10px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.4), 0 0 16px rgba(150,68,237,0.2);
    line-height: 1.45;
    transform: scale(0.95);
  }

  .instruction-popup.visible {
    opacity: 1;
    transform: scale(1);
  }

  .instruction-popup strong { color: var(--white); font-weight: 600; }

  .instruction-popup kbd {
    display: inline-block;
    padding: 1px 5px;
    background: rgba(255,255,255,0.1);
    border: 1px solid var(--white-20);
    border-radius: 4px;
    font-family: inherit;
    font-size: 0.85em;
    color: var(--accent);
    font-weight: 600;
  }

  .instruction-popup::after {
    content: '';
    position: absolute;
    width: 0;
    height: 0;
    border-style: solid;
  }

  .instruction-popup.pointer-down::after {
    bottom: -6px; left: 50%; transform: translateX(-50%);
    border-width: 6px 5px 0 5px;
    border-color: var(--accent) transparent transparent transparent;
  }

  .instruction-popup.pointer-up::after {
    top: -6px; left: 50%; transform: translateX(-50%);
    border-width: 0 5px 6px 5px;
    border-color: transparent transparent var(--accent) transparent;
  }

  .instruction-popup.pointer-left::after {
    left: -6px; top: 50%; transform: translateY(-50%);
    border-width: 5px 6px 5px 0;
    border-color: transparent var(--accent) transparent transparent;
  }

  .instruction-popup.pointer-right::after {
    right: -6px; top: 50%; transform: translateY(-50%);
    border-width: 5px 0 5px 6px;
    border-color: transparent transparent transparent var(--accent);
  }

  @media (max-width: 640px) {
    .carousel-stage { flex-direction: column; }
    .nav-arrow-overlay { display: none; }
    .video-card { max-width: 100%; width: 100%; }
    .thumbnail-strip { order: -1; width: 100%; justify-content: flex-start; padding: 0.3rem 0; }
  }

  @media (max-width: 480px) {
    .content { padding: 0.6rem; gap: 0.5rem; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
</head>
<body>

<div class="canvas">
  <div class="bg-layer"></div>
  <div class="bg-overlay"></div>

  <div class="content">
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progressBar"></div>
    </div>

    <div class="carousel-stage" id="carouselStage">
      <div class="video-card" id="videoCard">
        <div class="video-player" id="videoPlayer">
          <video id="mainVideo" preload="metadata" playsinline></video>

          <button class="nav-arrow-overlay prev" id="prevBtn" aria-label="Previous video">
            <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
          </button>
          <button class="nav-arrow-overlay next" id="nextBtn" aria-label="Next video">
            <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
          </button>

          <div class="video-overlay" id="videoOverlay">
            <button class="play-button" id="playBtn" aria-label="Play video">
              <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            </button>
          </div>

          <!-- FIX 4: Error state shown when video fails to load -->
          <div class="video-error-msg" id="videoErrorMsg">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
            Video could not be loaded.<br>Check your file path or network connection.
          </div>

          <div class="video-duration" id="videoDuration">0:00</div>
          <div class="video-progress-wrap">
            <div class="video-progress-fill" id="videoProgressFill"></div>
          </div>
          <div class="instruction-popup" id="instructionPopup"></div>
        </div>
      </div>
    </div>

    <div class="thumbnail-strip" id="thumbnailStrip"></div>
    <div class="dot-indicators" id="dotIndicators"></div>

    <div class="footer">
      <span class="progress-text"><strong id="visitedCount">0</strong> / <span id="totalCount">0</span> watched</span>
      <span class="completion-label" id="completionLabel">Begin watching</span>
    </div>
  </div>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
  // ============================================================
  // CONFIGURATION
  // ============================================================
  //
  // HOW TO USE:
  // 1. Upload your video and thumbnail image files to your hosting
  //    (e.g. GitHub Pages at https://USERNAME.github.io/REPO/)
  // 2. Replace the videoUrl and posterUrl values below with your
  //    full HTTPS URLs — do NOT use relative paths (./videos/...)
  // 3. Add more objects to the VIDEOS array for more videos
  //
  // EXAMPLE GitHub Pages URL structure:
  //   https://USERNAME.github.io/REPO-NAME/videos/video-01.mp4
  //   https://USERNAME.github.io/REPO-NAME/videos/video-01.jpg
  //
  // ============================================================

  const VIDEOS = [
    {
      videoUrl:  "https://USERNAME.github.io/REPO-NAME/videos/video-01.mp4",
      posterUrl: "https://USERNAME.github.io/REPO-NAME/videos/video-01.jpg",
      duration:  "0:00"
    },
    {
      videoUrl:  "https://USERNAME.github.io/REPO-NAME/videos/video-02.mp4",
      posterUrl: "https://USERNAME.github.io/REPO-NAME/videos/video-02.jpg",
      duration:  "0:00"
    }
  ];

  // ============================================================
  // Instruction messages
  // ============================================================
  const INSTRUCTIONS = {
    playBtn: {
      start:   "<strong>Click to play</strong> the video. Use <kbd>Space</kbd> to pause/resume.",
      playing: "<strong>Click to pause</strong> the video. Use <kbd>Space</kbd> to resume.",
      watched: "<strong>Rewatch</strong> this video anytime. Click to play again."
    },
    prevBtn: {
      default:  "<strong>Previous video</strong>. Click or press <kbd>←</kbd> to go back.",
      disabled: "This is the first video."
    },
    nextBtn: {
      default:    "<strong>Next video</strong>. Click or press <kbd>→</kbd> to continue.",
      oneWatched: "<strong>Next video</strong> — one more to watch! Click or press <kbd>→</kbd>.",
      allWatched: "<strong>Rewatch</strong> the next video. You've seen them all!",
      disabled:   "This is the last video."
    }
  };

  // ============================================================
  // State
  // ============================================================
  const watched = new Set();
  let currentIndex = 0;
  let isPlaying = false;
  const watchThreshold = 0.7;

  // ============================================================
  // DOM Elements
  // ============================================================
  const video            = document.getElementById('mainVideo');
  const videoOverlay     = document.getElementById('videoOverlay');
  const videoErrorMsg    = document.getElementById('videoErrorMsg');
  const playBtn          = document.getElementById('playBtn');
  const videoDuration    = document.getElementById('videoDuration');
  const videoProgressFill= document.getElementById('videoProgressFill');
  const videoCard        = document.getElementById('videoCard');
  const videoPlayer      = document.getElementById('videoPlayer');
  const prevBtn          = document.getElementById('prevBtn');
  const nextBtn          = document.getElementById('nextBtn');
  const thumbnailStrip   = document.getElementById('thumbnailStrip');
  const dotIndicators    = document.getElementById('dotIndicators');
  const progressBar      = document.getElementById('progressBar');
  const visitedCountEl   = document.getElementById('visitedCount');
  const totalCountEl     = document.getElementById('totalCount');
  const completionLabel  = document.getElementById('completionLabel');
  const tooltip          = document.getElementById('tooltip');
  const instructionPopup = document.getElementById('instructionPopup');

  totalCountEl.textContent = VIDEOS.length;

  // ============================================================
  // FIX 4: Video error handler — shows error state, hides overlay
  // ============================================================
  function showVideoError() {
    videoErrorMsg.classList.add('visible');
    videoOverlay.classList.add('hidden');
  }

  function clearVideoError() {
    videoErrorMsg.classList.remove('visible');
  }

  video.addEventListener('error', showVideoError);

  // ============================================================
  // Instruction Popup
  // ============================================================
  function showInstructionPopup(element, htmlContent, position) {
    instructionPopup.innerHTML = htmlContent;
    instructionPopup.className = 'instruction-popup';
    instructionPopup.classList.add('visible');

    const playerRect  = videoPlayer.getBoundingClientRect();
    const elementRect = element.getBoundingClientRect();
    const elLeft      = elementRect.left - playerRect.left;
    const elTop       = elementRect.top  - playerRect.top;
    const elRight     = elementRect.right - playerRect.left;
    const elBottom    = elementRect.bottom - playerRect.top;
    const elCenterX   = elLeft + elementRect.width  / 2;
    const elCenterY   = elTop  + elementRect.height / 2;
    const popupWidth  = 220;
    const popupHeight = 50;
    const gap         = 4;
    const padding     = 8;
    let left, top, pointerClass;

    if (position === 'playBtn') {
      pointerClass = 'pointer-down';
      left = elCenterX - popupWidth / 2;
      top  = elTop - popupHeight - gap;
      if (top < padding) { top = elBottom + gap; pointerClass = 'pointer-up'; }
      left = Math.max(padding, Math.min(left, playerRect.width - popupWidth - padding));
    } else if (position === 'prevBtn') {
      pointerClass = 'pointer-left';
      left = elRight + gap;
      top  = elCenterY - popupHeight / 2;
      if (left + popupWidth > playerRect.width - padding) {
        left = elCenterX - popupWidth / 2;
        top  = elTop - popupHeight - gap;
        pointerClass = 'pointer-down';
      }
      top  = Math.max(padding, Math.min(top,  playerRect.height - popupHeight - padding));
      left = Math.max(padding, Math.min(left, playerRect.width  - popupWidth  - padding));
    } else if (position === 'nextBtn') {
      pointerClass = 'pointer-right';
      left = elLeft - popupWidth - gap;
      top  = elCenterY - popupHeight / 2;
      if (left < padding) {
        left = elCenterX - popupWidth / 2;
        top  = elTop - popupHeight - gap;
        pointerClass = 'pointer-down';
      }
      top  = Math.max(padding, Math.min(top,  playerRect.height - popupHeight - padding));
      left = Math.max(padding, Math.min(left, playerRect.width  - popupWidth  - padding));
    }

    instructionPopup.style.left = left + 'px';
    instructionPopup.style.top  = top  + 'px';
    instructionPopup.classList.add(pointerClass);
  }

  function hideInstructionPopup() {
    instructionPopup.classList.remove('visible');
  }

  function getPlayBtnInstruction() {
    if (watched.has(currentIndex)) return INSTRUCTIONS.playBtn.watched;
    if (isPlaying)                 return INSTRUCTIONS.playBtn.playing;
    return INSTRUCTIONS.playBtn.start;
  }

  function getNextBtnInstruction() {
    if (nextBtn.disabled) return INSTRUCTIONS.nextBtn.disabled;
    const count = watched.size;
    const total = VIDEOS.length;
    if (count === total)               return INSTRUCTIONS.nextBtn.allWatched;
    if (count === 1 && currentIndex === 0) return INSTRUCTIONS.nextBtn.oneWatched;
    return INSTRUCTIONS.nextBtn.default;
  }

  function getPrevBtnInstruction() {
    return prevBtn.disabled ? INSTRUCTIONS.prevBtn.disabled : INSTRUCTIONS.prevBtn.default;
  }

  function attachInstructionPopups() {
    playBtn.addEventListener('mouseenter', () => showInstructionPopup(playBtn, getPlayBtnInstruction(), 'playBtn'));
    playBtn.addEventListener('mouseleave', hideInstructionPopup);
    prevBtn.addEventListener('mouseenter', () => showInstructionPopup(prevBtn, getPrevBtnInstruction(), 'prevBtn'));
    prevBtn.addEventListener('mouseleave', hideInstructionPopup);
    nextBtn.addEventListener('mouseenter', () => showInstructionPopup(nextBtn, getNextBtnInstruction(), 'nextBtn'));
    nextBtn.addEventListener('mouseleave', hideInstructionPopup);
  }

  // ============================================================
  // Build Thumbnails & Dots
  // ============================================================
  VIDEOS.forEach((item, index) => {
    // Thumbnail
    const thumb = document.createElement('div');
    thumb.className = 'thumbnail';
    thumb.dataset.index = index;

    // FIX 4: onerror fallback on thumbnail image
    const img = document.createElement('img');
    img.src = item.posterUrl;
    img.alt = 'Video ' + (index + 1);
    img.loading = 'lazy';
    img.onerror = function() {
      this.style.display = 'none';
      const fb = document.createElement('div');
      fb.className = 'thumbnail-fallback';
      fb.textContent = String(index + 1).padStart(2, '0');
      thumb.insertBefore(fb, thumb.firstChild);
    };

    const numSpan = document.createElement('span');
    numSpan.className = 'thumbnail-number';
    numSpan.textContent = String(index + 1).padStart(2, '0');

    thumb.appendChild(img);
    thumb.appendChild(numSpan);

    thumb.addEventListener('click', () => goToSlide(index));
    thumb.addEventListener('mouseenter', (e) => {
      const status = watched.has(index) ? ' (watched)' : ' (unwatched)';
      showTooltip(e, 'Video ' + (index + 1) + status);
    });
    thumb.addEventListener('mouseleave', hideTooltip);
    thumbnailStrip.appendChild(thumb);

    // Dot
    const dot = document.createElement('div');
    dot.className = 'dot';
    dot.dataset.index = index;
    dot.addEventListener('click', () => goToSlide(index));
    dotIndicators.appendChild(dot);
  });

  // ============================================================
  // Load Video
  // ============================================================
  function loadVideo(index) {
    const item = VIDEOS[index];
    video.pause();
    isPlaying = false;
    videoOverlay.classList.remove('hidden');
    clearVideoError();

    video.src = item.videoUrl;
    if (item.posterUrl) video.poster = item.posterUrl;
    video.load();

    videoDuration.textContent = item.duration;
    videoProgressFill.style.width = '0%';

    updateCardState(index);
    updateThumbnails();
    updateDots();
    updateNavButtons();
  }

  function updateCardState(index) {
    videoCard.classList.remove('active', 'visited');
    if (watched.has(index)) videoCard.classList.add('visited');
    videoCard.classList.add('active');
  }

  function updateThumbnails() {
    thumbnailStrip.querySelectorAll('.thumbnail').forEach((thumb, i) => {
      thumb.classList.remove('active', 'visited');
      if (i === currentIndex) thumb.classList.add('active');
      if (watched.has(i))     thumb.classList.add('visited');
    });
  }

  function updateDots() {
    dotIndicators.querySelectorAll('.dot').forEach((dot, i) => {
      dot.classList.remove('active', 'watched');
      if (i === currentIndex) dot.classList.add('active');
      if (watched.has(i))     dot.classList.add('watched');
    });
  }

  function updateNavButtons() {
    prevBtn.disabled = currentIndex === 0;
    nextBtn.disabled = currentIndex === VIDEOS.length - 1;
  }

  // ============================================================
  // Navigation
  // ============================================================
  function goToSlide(index) {
    if (index < 0 || index >= VIDEOS.length) return;
    currentIndex = index;
    loadVideo(currentIndex);
  }

  function nextSlide() { goToSlide(currentIndex + 1); }
  function prevSlide() { goToSlide(currentIndex - 1); }

  // ============================================================
  // Playback
  // ============================================================
  function togglePlay() {
    if (video.paused) {
      video.play();
      isPlaying = true;
      videoOverlay.classList.add('hidden');
    } else {
      video.pause();
      isPlaying = false;
      videoOverlay.classList.remove('hidden');
    }
  }

  function markWatched() {
    if (!watched.has(currentIndex)) {
      watched.add(currentIndex);
      updateCardState(currentIndex);
      updateThumbnails();
      updateDots();
      updateProgress();
      updateCompletionLabel();
    }
  }

  function updateProgress() {
    const pct = (watched.size / VIDEOS.length) * 100;
    progressBar.style.width = pct + '%';
    visitedCountEl.textContent = watched.size;
  }

  function updateCompletionLabel() {
    const count = watched.size;
    const total = VIDEOS.length;
    if (count === 0) {
      completionLabel.textContent = 'Begin watching';
      completionLabel.style.color = '';
    } else if (count === total) {
      completionLabel.textContent = 'All videos watched!';
      completionLabel.style.color = 'var(--accent)';
    } else {
      const rem = total - count;
      completionLabel.textContent = rem + ' video' + (rem !== 1 ? 's' : '') + ' remaining';
      completionLabel.style.color = '';
    }
  }

  // ============================================================
  // Video Events
  // ============================================================
  video.addEventListener('timeupdate', () => {
    if (video.duration) {
      const progress = (video.currentTime / video.duration) * 100;
      videoProgressFill.style.width = progress + '%';
      const mins = Math.floor(video.duration / 60);
      const secs = Math.floor(video.duration % 60);
      videoDuration.textContent = mins + ':' + String(secs).padStart(2, '0');
      if (video.currentTime / video.duration >= watchThreshold) markWatched();
    }
  });

  video.addEventListener('ended', () => {
    markWatched();
    isPlaying = false;
    videoOverlay.classList.remove('hidden');
  });

  video.addEventListener('click', togglePlay);
  playBtn.addEventListener('click', (e) => { e.stopPropagation(); togglePlay(); });

  prevBtn.addEventListener('click', prevSlide);
  nextBtn.addEventListener('click', nextSlide);

  // ============================================================
  // Keyboard
  // ============================================================
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft')           prevSlide();
    if (e.key === 'ArrowRight')          nextSlide();
    if (e.key === ' ' || e.key === 'k') { e.preventDefault(); togglePlay(); }
  });

  // ============================================================
  // Touch / Swipe
  // ============================================================
  let touchStartX = 0;
  let touchEndX   = 0;

  videoCard.addEventListener('touchstart', (e) => {
    touchStartX = e.changedTouches[0].screenX;
  }, { passive: true });

  videoCard.addEventListener('touchend', (e) => {
    touchEndX = e.changedTouches[0].screenX;
    const diff = touchStartX - touchEndX;
    if (Math.abs(diff) > 50) {
      if (diff > 0) nextSlide();
      else          prevSlide();
    }
  }, { passive: true });

  // ============================================================
  // Tooltip
  // ============================================================
  function showTooltip(e, text) {
    tooltip.textContent = text;
    tooltip.classList.add('visible');
    tooltip.style.left = (e.clientX + 12) + 'px';
    tooltip.style.top  = (e.clientY + 12) + 'px';
  }

  function hideTooltip() {
    tooltip.classList.remove('visible');
  }

  // ============================================================
  // Init
  // ============================================================
  loadVideo(0);
  attachInstructionPopups();
</script>

</body>
</html>
